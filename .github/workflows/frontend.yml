name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'course-event-client/**'  # запускається тільки якщо змінився фронт

jobs:
  deploy:
    runs-on: self-hosted  # твій локальний сервер

    steps:
      - name: Checkout коду
        uses: actions/checkout@v4

      - name: Встановити Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: course-event-client/package-lock.json

      - name: Встановити залежності
        working-directory: course-event-client
        run: npm ci

      - name: Білд
        working-directory: course-event-client
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build

      - name: Перезапустити сервіс
        run: |
          pm2 restart frontend || pm2 start npm --name "frontend" -- start
        working-directory: course-event-client